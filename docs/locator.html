<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LGP 21 Locator</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #e0e0e0;
            font-family: sans-serif;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .container {
            position: relative;
            width: 95vw;
            max-width: 800px; 
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
        }

        #inner-dial {
            position: absolute;
            width: 75%; /* Updated scale to 75% as requested */
            height: 75%;
            object-fit: contain;
            z-index: 2;
            cursor: grab;
            touch-action: none; 
            user-select: none;
            -webkit-user-drag: none;
        }

        #inner-dial:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="img/locator_outer.png" class="outer-ring" alt="Outer Template">
    <img src="img/locator_inner.png" id="inner-dial" alt="Inner Dial">
</div>

<script>
    const dial = document.getElementById('inner-dial');
    let isDragging = false;
    
    // Variables to track relative rotation
    let startAngle = 0;
    let currentRotation = 0;

    /**
     * Calculates the absolute angle of the pointer relative to the dial center.
     */
    function getPointerAngle(clientX, clientY) {
        const rect = dial.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const radians = Math.atan2(clientY - centerY, clientX - centerX);
        return radians * (180 / Math.PI);
    }

    function handleMove(e) {
        if (!isDragging) return;

        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);

        if (clientX === undefined || clientY === undefined) return;

        // Calculate the new angle of the pointer
        const moveAngle = getPointerAngle(clientX, clientY);
        
        // Calculate the delta since the start of the drag and apply it to the previous rotation
        const delta = moveAngle - startAngle;
        const totalRotation = currentRotation + delta;
        
        dial.style.transform = `rotate(${totalRotation}deg)`;
    }

    function startDrag(e) {
        if (e.touches && e.touches.length > 1) {
            isDragging = false;
            return;
        }
        
        isDragging = true;
        
        // Capture the initial pointer angle at the moment of click/touch
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);
        startAngle = getPointerAngle(clientX, clientY);
    }

    function stopDrag() {
        if (isDragging) {
            // Store the final rotation so the next drag starts from this position
            const transform = dial.style.transform;
            const match = transform.match(/rotate\(([^deg]+)deg\)/);
            if (match) {
                currentRotation = parseFloat(match[1]);
            }
            isDragging = false;
        }
    }

    // Interaction Listeners
    dial.addEventListener('mousedown', startDrag);
    dial.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            startDrag(e);
        }
    }, { passive: true });

    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => {
        if (isDragging) {
            if (e.cancelable) e.preventDefault();
            handleMove(e);
        }
    }, { passive: false });

    window.addEventListener('mouseup', stopDrag);
    window.addEventListener('touchend', stopDrag);
    window.addEventListener('touchcancel', stopDrag);
</script>

</body>
</html>

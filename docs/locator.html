<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Updated viewport to allow user scaling/zooming -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LGP 21 Locator</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #e0e0e0;
            font-family: sans-serif;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .container {
            position: relative;
            width: 95vw;
            max-width: 800px; 
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

        /* The static outer ring */
        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
        }

        /* The rotatable inner dial */
        #inner-dial {
            position: absolute;
            width: 75%;
            height: 75%;
            object-fit: contain;
            z-index: 2;
            cursor: grab;
            touch-action: none; 
            user-select: none;
            -webkit-user-drag: none;
            transition: transform 0.05s linear;
        }

        #inner-dial:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="img/locator_outer.png" class="outer-ring" alt="Outer Template">
    <img src="img/locator_inner.png" id="inner-dial" alt="Inner Dial">
</div>

<script>
    const dial = document.getElementById('inner-dial');
    let isDragging = false;

    /**
     * Calculates the angle between the center of the dial and the pointer.
     */
    function getAngle(clientX, clientY) {
        const rect = dial.getBoundingClientRect();
        // Calculate center relative to viewport to match clientX/Y
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const radians = Math.atan2(clientY - centerY, clientX - centerX);
        return radians * (180 / Math.PI);
    }

    function handleMove(e) {
        if (!isDragging) return;

        // Support both Mouse and Touch events
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const degrees = getAngle(clientX, clientY);
        
        // Apply rotation (offset by 90 to align naturally with the image orientation)
        dial.style.transform = `rotate(${degrees + 90}deg)`;
    }

    function startDrag(e) {
        // Multi-touch check for zoom gestures
        if (e.touches && e.touches.length > 1) {
            isDragging = false;
            return;
        }
        
        isDragging = true;
        handleMove(e);
    }

    function stopDrag() {
        isDragging = false;
    }

    // Pointer listeners for the dial
    dial.addEventListener('mousedown', startDrag);
    dial.addEventListener('touchstart', (e) => {
        // Only prevent default (scrolling) if we are actually starting a drag
        if (e.touches.length === 1) {
            startDrag(e);
        }
    }, { passive: true });

    // Global listeners for movement and release
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => {
        if (isDragging) {
            // Prevent scrolling only while actively dragging the dial
            if (e.cancelable) e.preventDefault();
            handleMove(e);
        }
    }, { passive: false });

    window.addEventListener('mouseup', stopDrag);
    window.addEventListener('touchend', stopDrag);
    window.addEventListener('touchcancel', stopDrag);
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LGP 21 Locator</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #e0e0e0;
            font-family: sans-serif;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .container {
            position: relative;
            width: 95vw;
            max-width: 800px; 
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
        }

        #inner-dial {
            position: absolute;
            width: 75%;
            height: 75%;
            object-fit: contain;
            z-index: 2;
            cursor: grab;
            touch-action: none; 
            user-select: none;
            -webkit-user-drag: none;
            border-radius: 50%;
        }

        #inner-dial:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="img/locator_outer.png" class="outer-ring" alt="Outer Template">
    <img src="img/locator_inner.png" id="inner-dial" alt="Inner Dial">
</div>

<script>
    const dial = document.getElementById('inner-dial');
    let isDragging = false;
    
    let startAngle = 0;
    let currentRotation = 0;

    /**
     * Helper to get pointer coordinates across mouse and touch
     */
    function getPointerCoords(e) {
        return {
            x: e.clientX || (e.touches && e.touches[0].clientX),
            y: e.clientY || (e.touches && e.touches[0].clientY)
        };
    }

    /**
     * Calculates the absolute angle and distance from the center of the dial.
     */
    function getPointerStats(clientX, clientY) {
        const rect = dial.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        const dx = clientX - centerX;
        const dy = clientY - centerY;
        
        const radians = Math.atan2(dy, dx);
        const distance = Math.sqrt(dx * dx + dy * dy);
        
        return {
            angle: radians * (180 / Math.PI),
            distance: distance,
            radius: rect.width / 2
        };
    }

    function handleMove(e) {
        if (!isDragging) return;

        const coords = getPointerCoords(e);
        if (coords.x === undefined || coords.y === undefined) return;

        const stats = getPointerStats(coords.x, coords.y);
        
        // Calculate the delta since the start of the drag
        const delta = stats.angle - startAngle;
        const totalRotation = currentRotation + delta;
        
        dial.style.transform = `rotate(${totalRotation}deg)`;
    }

    function startDrag(e) {
        // Multi-touch check
        if (e.touches && e.touches.length > 1) {
            isDragging = false;
            return;
        }
        
        const coords = getPointerCoords(e);
        const stats = getPointerStats(coords.x, coords.y);

        // CHECK HIT RANGE: Is the pointer inside the inscribed circle?
        if (stats.distance <= stats.radius) {
            isDragging = true;
            startAngle = stats.angle;
            
            // Re-capture current rotation from style to ensure continuity
            const transform = dial.style.transform;
            const match = transform.match(/rotate\(([^deg]+)deg\)/);
            if (match) {
                currentRotation = parseFloat(match[1]);
            }
        } else {
            isDragging = false;
        }
    }

    function stopDrag() {
        if (isDragging) {
            const transform = dial.style.transform;
            const match = transform.match(/rotate\(([^deg]+)deg\)/);
            if (match) {
                currentRotation = parseFloat(match[1]);
            }
            isDragging = false;
        }
    }

    // Interaction Listeners
    dial.addEventListener('mousedown', startDrag);
    dial.addEventListener('touchstart', (e) => {
        // Note: we don't preventDefault here to allow scrolling if the touch was outside the circle
        if (e.touches.length === 1) {
            startDrag(e);
        }
    }, { passive: true });

    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => {
        if (isDragging) {
            // ONLY prevent page scroll if we successfully started a drag inside the circle
            if (e.cancelable) e.preventDefault();
            handleMove(e);
        }
    }, { passive: false });

    window.addEventListener('mouseup', stopDrag);
    window.addEventListener('touchend', stopDrag);
    window.addEventListener('touchcancel', stopDrag);
</script>

</body>
</html>

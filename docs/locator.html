<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LGP 21 Locator</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            background-color: #e0e0e0;
            font-family: sans-serif;
            padding: 20px 0;
            box-sizing: border-box;
        }

        .container {
            position: relative;
            width: 95vw;
            max-width: 800px; 
            aspect-ratio: 1 / 1;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: auto;
        }

        .outer-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: contain;
            pointer-events: none;
            z-index: 1;
        }

        #inner-dial {
            position: absolute;
            width: 75%;
            height: 75%;
            object-fit: contain;
            z-index: 2;
            cursor: grab;
            touch-action: none; 
            user-select: none;
            -webkit-user-drag: none;
        }

        #inner-dial:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

<div class="container">
    <img src="img/locator_outer.png" class="outer-ring" alt="Outer Template">
    <img src="img/locator_inner.png" id="inner-dial" alt="Inner Dial">
</div>

<script>
    const dial = document.getElementById('inner-dial');
    let isDragging = false;

    /**
     * Calculates the angle between the center of the dial and the pointer.
     */
    function getAngle(clientX, clientY) {
        const rect = dial.getBoundingClientRect();
        const centerX = rect.left + rect.width / 2;
        const centerY = rect.top + rect.height / 2;

        // Math.atan2 returns radians from -PI to PI
        const radians = Math.atan2(clientY - centerY, clientX - centerX);
        return radians * (180 / Math.PI);
    }

    function handleMove(e) {
        if (!isDragging) return;

        // Use pointer coordinates for both mouse and touch
        const clientX = e.clientX || (e.touches && e.touches[0].clientX);
        const clientY = e.clientY || (e.touches && e.touches[0].clientY);

        if (clientX === undefined || clientY === undefined) return;

        const degrees = getAngle(clientX, clientY);
        
        // Apply rotation immediately. 
        // We add 90 because the image's "up" is 90 degrees offset from the 0-radian X-axis.
        dial.style.transform = `rotate(${degrees + 90}deg)`;
    }

    function startDrag(e) {
        // Allow multi-touch for zooming
        if (e.touches && e.touches.length > 1) {
            isDragging = false;
            return;
        }
        
        isDragging = true;
        handleMove(e);
    }

    function stopDrag() {
        isDragging = false;
    }

    // Interaction Listeners
    dial.addEventListener('mousedown', startDrag);
    dial.addEventListener('touchstart', (e) => {
        if (e.touches.length === 1) {
            startDrag(e);
        }
    }, { passive: true });

    // Window-level listeners catch movement even if the pointer leaves the dial area
    window.addEventListener('mousemove', handleMove);
    window.addEventListener('touchmove', (e) => {
        if (isDragging) {
            // Prevent page scroll only when actively rotating
            if (e.cancelable) e.preventDefault();
            handleMove(e);
        }
    }, { passive: false });

    window.addEventListener('mouseup', stopDrag);
    window.addEventListener('touchend', stopDrag);
    window.addEventListener('touchcancel', stopDrag);
</script>

</body>
</html>
